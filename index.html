<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>DayFlow</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

<style>

html,body{
    margin:0;
    height:100%;
    overflow:hidden;
    background:#000;
    color:white;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

canvas{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
}

#overlay{
    position:absolute;
    width:100%;
    top:14%;
    text-align:center;
    z-index:10;
    pointer-events:none;
}

#now{
    font-size:18px;
    font-weight:500;
    opacity:.78;
    margin-bottom:6px;
}

#time{
    font-family:'Bebas Neue',sans-serif;
    font-size:96px;
    line-height:.9;
    letter-spacing:1px;
    margin:0;
}

#until{
    font-size:24px;
    font-weight:600;
    opacity:.95;
    margin-top:8px;
}

#percent{
    font-size:20px;
    font-weight:600;
    color:#15e6c8;
    margin-top:10px;
}

#ruler{
    position:absolute;
    right:14px;
    top:0;
    width:75px;
    height:100%;
    z-index:20;
}

.tick{
    position:absolute;
    right:0;
    display:flex;
    align-items:center;
    justify-content:flex-end;
    gap:10px;
    color:white;
    opacity:.55;
    font-size:14px;
}

.tick .line{
    width:12px;
    height:1px;
    background:rgba(255,255,255,.35);
}

.major{
    opacity:.9;
    font-size:18px;
}

.major .line{
    width:30px;
    background:rgba(255,255,255,.85);
}

</style>
</head>

<body>

<canvas id="c"></canvas>

<div id="overlay">
    <div id="now">now 03:39 PM</div>
    <div id="time">8h 21m</div>
    <div id="until">until bedtime</div>
    <div id="percent">52% of day left</div>
</div>

<div id="ruler"></div>

<script>

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

let t = 0;

/* WATER */

function drawWater(level){

    const w = canvas.width;
    const h = canvas.height;

    ctx.clearRect(0,0,w,h);

    const baseY = h * (0.25 + (1 - level) * 0.65);

    // Deep black upper background
    const bg = ctx.createLinearGradient(0,0,0,h);

    bg.addColorStop(0,"#000000");
    bg.addColorStop(0.35,"#010506");
    bg.addColorStop(1,"#001418");

    ctx.fillStyle = bg;
    ctx.fillRect(0,0,w,h);

    // Water shape
    ctx.beginPath();

    for(let x=0;x<=w;x+=4){

        const y =
            baseY +
            Math.sin(x*0.010 + t)*14 +
            Math.sin(x*0.022 - t*1.4)*5;

        if(x===0) ctx.moveTo(x,y);
        else ctx.lineTo(x,y);
    }

    ctx.lineTo(w,h);
    ctx.lineTo(0,h);
    ctx.closePath();

    const water = ctx.createLinearGradient(
        0,
        baseY-60,
        0,
        h
    );

    // Bright teal lake/ocean look
    water.addColorStop(0,"rgba(50,255,225,1)");
    water.addColorStop(0.10,"rgba(30,245,215,1)");
    water.addColorStop(0.30,"rgba(0,215,190,1)");
    water.addColorStop(0.55,"rgba(0,155,145,1)");
    water.addColorStop(0.80,"rgba(0,85,95,1)");
    water.addColorStop(1,"rgba(0,30,40,1)");

    ctx.fillStyle = water;
    ctx.fill();

    // Surface light bloom
    ctx.save();

    ctx.beginPath();

    for(let x=0;x<=w;x+=4){

        const y =
            baseY +
            Math.sin(x*0.010 + t)*14 +
            Math.sin(x*0.022 - t*1.4)*5;

        if(x===0) ctx.moveTo(x,y);
        else ctx.lineTo(x,y);
    }

    ctx.lineTo(w,h);
    ctx.lineTo(0,h);
    ctx.closePath();

    ctx.clip();

    const glow = ctx.createLinearGradient(
        0,
        baseY-20,
        0,
        baseY+350
    );

    glow.addColorStop(0,"rgba(255,255,255,.38)");
    glow.addColorStop(.08,"rgba(180,255,245,.45)");
    glow.addColorStop(.20,"rgba(90,255,230,.28)");
    glow.addColorStop(1,"rgba(0,0,0,0)");

    ctx.fillStyle = glow;
    ctx.fillRect(0,baseY-30,w,400);

    ctx.restore();

    // White crest highlight
    ctx.beginPath();

    for(let x=0;x<=w;x+=3){

        const y =
            baseY +
            Math.sin(x*0.010 + t)*14 +
            Math.sin(x*0.022 - t*1.4)*5;

        if(x===0) ctx.moveTo(x,y);
        else ctx.lineTo(x,y);
    }

    ctx.strokeStyle = "rgba(255,255,255,.95)";
    ctx.lineWidth = 2.5;
    ctx.shadowColor = "rgba(120,255,240,.95)";
    ctx.shadowBlur = 18;
    ctx.stroke();

    ctx.shadowBlur = 0;

    // Underwater particles
    for(let i=0;i<120;i++){

        const px = (i * 127.13 + t * 40) % w;
        const py = baseY + ((i * 91.37) % (h-baseY));

        ctx.beginPath();
        ctx.arc(px,py,Math.random()*1.2,0,Math.PI*2);
        ctx.fillStyle = "rgba(255,255,255,.06)";
        ctx.fill();
    }

    t += 0.015;
}

/* RULER */

function buildRuler(){

    const ruler = document.getElementById("ruler");
    ruler.innerHTML = "";

    const labels = [15,12,9,6,3,0];

    for(let i=0;i<labels.length;i++){

        const y = 10 + i * 18;

        const major = document.createElement("div");
        major.className = "tick major";
        major.style.top = `${y}%`;
        major.innerHTML = `<div class="line"></div>${labels[i]}h`;
        ruler.appendChild(major);

        if(i < labels.length-1){

            for(let j=1;j<=4;j++){

                const minor = document.createElement("div");
                minor.className = "tick";
                minor.style.top = `${y + j*3.6}%`;
                minor.innerHTML = `<div class="line"></div>`;
                ruler.appendChild(minor);
            }
        }
    }
}

buildRuler();

/* CLOCK */

function update(){

    const now = new Date();

    // Current time

    const hour = now.getHours();
    const minute = now.getMinutes();

    const ampm = hour >= 12 ? "PM" : "AM";
    const hour12 = hour % 12 || 12;

    document.getElementById("now").textContent =
        `now ${String(hour12).padStart(2,"0")}:${String(minute).padStart(2,"0")} ${ampm}`;

    // Bedtime

    const bedtime = new Date();
    bedtime.setHours(23,0,0,0);

    let remaining = bedtime - now;

    if(remaining < 0){
        remaining += 24 * 60 * 60 * 1000;
    }

    const hrs = Math.floor(remaining / 3600000);
    const mins = Math.floor((remaining % 3600000) / 60000);

    document.getElementById("time").textContent =
        `${hrs}h ${mins}m`;

    // Day left %

    const start = new Date();
    start.setHours(0,0,0,0);

    const end = new Date();
    end.setHours(24,0,0,0);

    const progress =
        (now - start) / (end - start);

    const dayLeft =
        Math.round((1 - progress) * 100);

    document.getElementById("percent").textContent =
        `${dayLeft}% of day left`;

    drawWater(progress);
}

update();
setInterval(update,1000);

</script>

</body>
</html>
