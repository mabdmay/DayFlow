<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>DayFlow</title>

<!-- UPDATED: Add Bebas Neue -->
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
html,body{
    margin:0;
    height:100%;
    overflow:hidden;
    background:#05070a;
    font-family:-apple-system, system-ui;
    color:white;
}

/* FULL SCREEN WATER */
canvas{
    position:absolute;
    width:100%;
    height:100%;
    left:0;
    top:0;
    z-index:0;
}

/* TOP + CENTER TEXT */
#overlay{
    position:absolute;
    width:100%;
    top:18%;
    text-align:center;
    z-index:5;
    pointer-events:none;
}

#now{
    font-size:14px;
    opacity:0.6;
    letter-spacing:0.3px;
}

#time{
    font-size:64px;
    font-weight:600;
    letter-spacing:-2px;
    margin-top:6px;

    /* UPDATED: Bebas Neue font */
    font-family: 'Bebas Neue', sans-serif;
}

#until{
    font-size:16px;
    opacity:0.85;
    margin-top:6px;
}

#percent{
    font-size:15px;
    margin-top:10px;
    color:#2ee6c6;
}

/* RIGHT SCALE */
#ruler{
    position:absolute;
    right:12px;
    top:0;
    height:100%;
    width:70px;
    z-index:10;
}

.tick{
    position:absolute;
    right:0;
    display:flex;
    align-items:center;
    justify-content:flex-end;
    gap:8px;
    font-size:12px;
    opacity:0.7;
}

.line{
    width:14px;
    height:1px;
    background:rgba(255,255,255,0.25);
}

.major .line{
    width:26px;
    background:rgba(255,255,255,0.65);
    height:1.2px;
}

</style>
</head>

<body>

<canvas id="c"></canvas>

<div id="overlay">
    <div id="now">now</div>
    <div id="time">--h --m</div>
    <div id="until">until bedtime</div>
    <div id="percent">--% of day left</div>
</div>

<div id="ruler"></div>

<script>

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.onresize = resize;

let t = 0;

/* WATER */
function drawWater(level){

    const w = canvas.width;
    const h = canvas.height;

    ctx.clearRect(0,0,w,h);

    const baseY = h * (0.25 + (1 - level) * 0.65);

    // UPDATED: Bright teal → deep ocean gradient
    let grad = ctx.createLinearGradient(0,0,0,h);
    grad.addColorStop(0, "rgba(0,255,200,0.55)");   // bright teal top
    grad.addColorStop(0.3, "rgba(0,180,150,0.45)");
    grad.addColorStop(0.6, "rgba(0,110,100,0.35)");
    grad.addColorStop(1, "rgba(0,40,50,0.55)");     // deep ocean bottom

    for(let layer=0; layer<5; layer++){

        ctx.beginPath();

        for(let x=0; x<=w; x+=6){

            let y =
                baseY +
                Math.sin(x*0.008 + t*(1 + layer*0.1))*12 +
                Math.sin(x*0.014 - t*1.2)*6;

            if(x===0) ctx.moveTo(x,y);
            else ctx.lineTo(x,y);
        }

        ctx.lineTo(w,h);
        ctx.lineTo(0,h);
        ctx.closePath();

        ctx.fillStyle = grad;

        // UPDATED: More luminous layers
        ctx.globalAlpha = 0.10 + layer*0.07;
        ctx.fill();
    }

    // UPDATED: brighter glowing surface line
    ctx.beginPath();
    for(let x=0; x<=w; x+=5){
        let y = baseY + Math.sin(x*0.01 + t)*6;
        if(x===0) ctx.moveTo(x,y);
        else ctx.lineTo(x,y);
    }

    ctx.strokeStyle = "rgba(80,255,230,0.9)";
    ctx.lineWidth = 1.6;
    ctx.shadowColor = "rgba(0,255,220,0.6)";
    ctx.shadowBlur = 8;
    ctx.stroke();

    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
    t += 0.02;
}

/* RULER */
function buildRuler(){

    const ruler = document.getElementById("ruler");
    ruler.innerHTML = "";

    const hours = [15,12,9,6,3,0];
    const h = window.innerHeight;

    for(let i=0;i<hours.length;i++){

        const y = (i/(hours.length-1)) * (h*0.75) + h*0.12;

        const tick = document.createElement("div");
        tick.className = "tick major";
        tick.style.top = `${y}px`;
        tick.innerHTML = `<div class="line"></div>${hours[i]}h`;
        ruler.appendChild(tick);

        if(i < hours.length-1){
            for(let j=1;j<=2;j++){
                const ty = y + (j/3)*((h*0.75)/(hours.length-1));

                const minor = document.createElement("div");
                minor.className = "tick";
                minor.style.top = `${ty}px`;
                minor.innerHTML = `<div class="line"></div>`;
                ruler.appendChild(minor);
            }
        }
    }
}

/* MAIN UPDATE */
function update(){

    const now = new Date();

    // UPDATED: Proper AM/PM formatting
    const h = now.getHours();
    const m = now.getMinutes();

    const ampm = h >= 12 ? "PM" : "AM";
    const h12 = h % 12 || 12;

    document.getElementById("now").innerText =
        `now ${String(h12).padStart(2,'0')}:${String(m).padStart(2,'0')} ${ampm}`;

    // BEDTIME
    const bedtime = new Date();
    bedtime.setHours(23,0,0,0);

    let diff = bedtime - now;
    if(diff < 0) diff += 24*60*60*1000;

    const hrs = Math.floor(diff / 3600000);
    const mins = Math.floor((diff % 3600000) / 60000);

    document.getElementById("time").innerText =
        `${hrs}h ${mins}m`;

    document.getElementById("until").innerText =
        "until bedtime";

    // DAY PROGRESS
    const start = new Date();
    start.setHours(0,0,0,0);

    const end = new Date();
    end.setHours(24,0,0,0);

    const progress = (now - start) / (end - start);
    const percent = Math.round(progress * 100);

    document.getElementById("percent").innerText =
        `${percent}% of day left`;

    drawWater(progress);
}

setInterval(update, 1000);
update();
buildRuler();

</script>

</body>
</html>
