<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>DayFlow</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
html,body{margin:0;height:100%;overflow:hidden;background:#000;color:#fff;font-family:-apple-system,system-ui}
canvas{position:absolute;inset:0;width:100%;height:100%}
#overlay{position:absolute;width:100%;top:17%;text-align:center;z-index:10;pointer-events:none}
#now{font-size:15px;opacity:.72}
#time{font-family:'Bebas Neue',sans-serif;font-size:78px;line-height:.95;letter-spacing:.5px}
#until{font-size:16px;opacity:.9}
#percent{font-size:15px;color:#0a8f7a;font-weight:600;margin-top:10px;text-shadow:0 1px 2px rgba(0,0,0,.35)}
#ruler{position:absolute;right:12px;top:0;height:100%;width:72px;z-index:20}
.tick{position:absolute;right:0;display:flex;align-items:center;justify-content:flex-end;gap:8px;font-size:11px;color:rgba(255,255,255,.78)}
.line{width:10px;height:1px;background:rgba(255,255,255,.35)}
.major .line{width:22px;background:rgba(255,255,255,.8)}
.label{min-width:26px;text-align:right}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="overlay">
<div id="now"></div>
<div id="time"></div>
<div id="until">until bedtime</div>
<div id="percent"></div>
</div>

<div id="ruler"></div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
resize();
addEventListener("resize", resize);

let dayStartHour = parseFloat(localStorage.getItem("dayStartHour")) || 8;
let dayEndHour   = parseFloat(localStorage.getItem("dayEndHour"))   || 23;

// --- Animation state ---
let t = 0;
let lastFrame = performance.now();
let waterLevel = 0;
let targetLevel = 0;

function rand(i, salt){
  const s = Math.sin(i * 12.9898 + salt * 78.233) * 43758.5453;
  return s - Math.floor(s);
}

// --- Particles: stable identity, smooth drift ---
const N_PARTICLES = 220;
const particles = [];
for (let i = 0; i < N_PARTICLES; i++){
  particles.push({
    x0:        rand(i, 1),
    y0:        rand(i, 2),
    speedX:    (rand(i, 3) - 0.5) * 14,
    speedY:    -rand(i, 4) * 5 - 1,
    size:      0.3 + rand(i, 5) * 1.7,
    alpha:     0.04 + rand(i, 6) * 0.10,
    bobPhase:  rand(i, 7) * Math.PI * 2,
    bobSpeed:  0.4 + rand(i, 8) * 0.9
  });
}

// --- Drifting gradient blobs: soft regions of slightly different shade wandering through the water ---
const N_BLOBS = 4;
const blobs = [];
for (let i = 0; i < N_BLOBS; i++){
  blobs.push({
    // Each blob's center traces a slow Lissajous-like figure
    xAmp:     0.3 + rand(i, 21) * 0.25,        // horizontal swing as fraction of width
    yAmp:     0.25 + rand(i, 22) * 0.3,        // vertical swing as fraction of depth
    xFreq:    0.018 + rand(i, 23) * 0.022,     // rad/sec — very slow
    yFreq:    0.014 + rand(i, 24) * 0.020,
    xPhase:   rand(i, 25) * Math.PI * 2,
    yPhase:   rand(i, 26) * Math.PI * 2,
    xCenter:  0.3 + rand(i, 27) * 0.4,         // anchor as fraction of width
    yCenter:  0.3 + rand(i, 28) * 0.5,         // anchor as fraction of depth
    radius:   0.45 + rand(i, 29) * 0.35,       // as fraction of width
    tone:     rand(i, 30)                       // 0..1, picks lighter vs warmer shade
  });
}

// --- Surface waves: 4 sine layers, slowed 3x ---
function waveAt(x, baseY, time){
  const swellPhase = x * 0.0048 + time * 0.183;
  const swell = Math.sin(swellPhase) + 0.22 * Math.sin(2 * swellPhase);

  return baseY
    + swell * 13
    + Math.sin(x * 0.011  + time * 0.317) * 6.5
    + Math.sin(x * 0.022  - time * 0.450) * 3.2
    + Math.sin(x * 0.045  + time * 0.617) * 1.5;
}

function drawScene(){
  const w = canvas.width, h = canvas.height;

  // 1. Background
  ctx.clearRect(0, 0, w, h);
  const bg = ctx.createLinearGradient(0, 0, 0, h);
  bg.addColorStop(0,   "#000");
  bg.addColorStop(0.5, "#010405");
  bg.addColorStop(1,   "#001112");
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, w, h);

  // 2. Water surface baseline
  const baseY = h * (0.25 + (1 - waterLevel) * 0.65);

  // 3. Water shape
  ctx.beginPath();
  for (let x = 0; x <= w; x += 3){
    const y = waveAt(x, baseY, t);
    if (x === 0) ctx.moveTo(x, y);
    else         ctx.lineTo(x, y);
  }
  ctx.lineTo(w, h);
  ctx.lineTo(0, h);
  ctx.closePath();

  // 4. Base water gradient
  const water = ctx.createLinearGradient(0, baseY - 100, 0, h);
  water.addColorStop(0.00, "rgb(228,255,250)");
  water.addColorStop(0.06, "rgb(205,250,240)");
  water.addColorStop(0.18, "rgb(48,182,156)");
  water.addColorStop(0.45, "rgb(10,182,153)");
  water.addColorStop(0.75, "rgb(3,132,112)");
  water.addColorStop(1.00, "rgb(1,78,72)");
  ctx.fillStyle = water;
  ctx.fill();

  // 5. Effects clipped to the water shape
  ctx.save();
  ctx.clip();

  // 5a. Soft glow band just below the surface
  const glow = ctx.createLinearGradient(0, baseY, 0, baseY + 380);
  glow.addColorStop(0,    "rgba(255,255,255,.36)");
  glow.addColorStop(0.08, "rgba(205,255,248,.28)");
  glow.addColorStop(0.25, "rgba(100,235,215,.16)");
  glow.addColorStop(1,    "rgba(0,0,0,0)");
  ctx.fillStyle = glow;
  ctx.fillRect(0, baseY - 20, w, 420);

  // 5b. Drifting gradient blobs — slowly wandering shades of teal
  const depthRange = h - baseY;
  ctx.globalCompositeOperation = "screen";
  for (const b of blobs){
    const cx = (b.xCenter + Math.sin(t * b.xFreq + b.xPhase) * b.xAmp) * w;
    const cy = baseY + (b.yCenter + Math.cos(t * b.yFreq + b.yPhase) * b.yAmp) * depthRange;
    const r  = b.radius * w;

    const blobGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
    if (b.tone > 0.5){
      // Brighter mint highlight
      blobGrad.addColorStop(0,    "rgba(190,255,235,0.11)");
      blobGrad.addColorStop(0.4,  "rgba(120,220,200,0.05)");
      blobGrad.addColorStop(1,    "rgba(0,0,0,0)");
    } else {
      // Warmer, deeper-teal current
      blobGrad.addColorStop(0,    "rgba(80,210,180,0.10)");
      blobGrad.addColorStop(0.4,  "rgba(40,170,150,0.04)");
      blobGrad.addColorStop(1,    "rgba(0,0,0,0)");
    }
    ctx.fillStyle = blobGrad;
    ctx.fillRect(0, baseY - 20, w, h - baseY + 20);
  }
  ctx.globalCompositeOperation = "source-over";

  // 5c. Particles
  for (const p of particles){
    let px = p.x0 * w + t * p.speedX;
    px = ((px % w) + w) % w;

    let py = baseY + p.y0 * depthRange + t * p.speedY;
    py = baseY + ((py - baseY) % depthRange + depthRange) % depthRange;

    px += Math.cos(t * p.bobSpeed * 0.7 + p.bobPhase) * 1.2;
    py += Math.sin(t * p.bobSpeed       + p.bobPhase) * 1.5;

    ctx.beginPath();
    ctx.arc(px, py, p.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${p.alpha})`;
    ctx.fill();
  }

  ctx.restore();

  // 6. Surface highlight line
  ctx.beginPath();
  for (let x = 0; x <= w; x += 2){
    const y = waveAt(x, baseY, t);
    if (x === 0) ctx.moveTo(x, y);
    else         ctx.lineTo(x, y);
  }
  ctx.strokeStyle = "rgba(245,255,250,.92)";
  ctx.lineWidth   = 2.2;
  ctx.shadowColor = "rgba(200,255,245,.55)";
  ctx.shadowBlur  = 12;
  ctx.stroke();
  ctx.shadowBlur  = 0;
}

function animate(now){
  const dt = Math.min(0.05, (now - lastFrame) / 1000);
  lastFrame = now;
  t += dt;

  waterLevel += (targetLevel - waterLevel) * Math.min(1, dt * 1.4);

  drawScene();
  requestAnimationFrame(animate);
}

function updateText(){
  const now = new Date();
  const hour = now.getHours();
  const minute = now.getMinutes();
  const ampm = hour >= 12 ? "PM" : "AM";
  const h12 = hour % 12 || 12;

  document.getElementById("now").innerText =
    `now ${String(h12).padStart(2,'0')}:${String(minute).padStart(2,'0')} ${ampm}`;

  const bedtime   = new Date();
  const endHour   = Math.floor(dayEndHour);
  const endMinute = Math.round((dayEndHour - endHour) * 60);
  bedtime.setHours(endHour, endMinute, 0, 0);

  let diff = bedtime - now;
  if (diff < 0) diff = 0;
  const hrs  = Math.floor(diff / 3600000);
  const mins = Math.floor((diff % 3600000) / 60000);
  document.getElementById("time").innerText = `${hrs}h ${mins}m`;

  const nowHours       = now.getHours() + now.getMinutes() / 60;
  const totalDayHours  = dayEndHour - dayStartHour;
  const remainingHours = Math.max(0, dayEndHour - nowHours);
  const remaining      = Math.round((remainingHours / totalDayHours) * 100);

  document.getElementById("percent").innerText = `${remaining}% of day left`;

  const progress = Math.min(1, Math.max(0, (nowHours - dayStartHour) / totalDayHours));
  targetLevel = 1 - progress;
}

function buildRuler(){
  const r = document.getElementById("ruler");
  r.innerHTML = "";
  const hours = [15, 12, 9, 6, 3, 0];
  const h = innerHeight;

  for (let i = 0; i < hours.length; i++){
    const y = (i / (hours.length - 1)) * (h * 0.75) + h * 0.12;

    const tick = document.createElement("div");
    tick.className = "tick major";
    tick.style.top = y + "px";
    tick.innerHTML = `<div class="label">${hours[i]}h</div><div class="line"></div>`;
    r.appendChild(tick);

    if (i < hours.length - 1){
      for (let j = 1; j <= 2; j++){
        const m = document.createElement("div");
        m.className = "tick";
        m.style.top = (y + (j / 3) * ((h * 0.75) / (hours.length - 1))) + "px";
        m.innerHTML = '<div class="line"></div>';
        r.appendChild(m);
      }
    }
  }
}

document.body.addEventListener("click", () => {
  const start = prompt("Day start time (24h format)", dayStartHour);
  if (start === null) return;
  const end = prompt("Day end time (24h format)", dayEndHour);
  if (end === null) return;
  dayStartHour = parseFloat(start);
  dayEndHour   = parseFloat(end);
  localStorage.setItem("dayStartHour", dayStartHour);
  localStorage.setItem("dayEndHour",   dayEndHour);
  updateText();
});

buildRuler();
updateText();
setInterval(updateText, 1000);
requestAnimationFrame(animate);
</script>
</body>
</html>
