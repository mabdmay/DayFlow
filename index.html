<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>DayFlow</title>

<style>
html,body{
    margin:0;
    height:100%;
    overflow:hidden;
    background:#05070a;
    font-family:-apple-system, system-ui;
}

/* main container */
#app{
    position:relative;
    height:100vh;
    width:100vw;
    background: radial-gradient(circle at top, #0b1b1f, #05070a);
}

/* water container */
#waterBox{
    position:absolute;
    bottom:0;
    width:100%;
    height:100%;
    overflow:hidden;
}

/* animated liquid */
#water{
    position:absolute;
    bottom:0;
    width:200%;
    height:100%;
    background: linear-gradient(
        120deg,
        #00ff87,
        #00d4ff,
        #0099ff,
        #00ff87
    );
    background-size:400% 400%;
    animation: gradientMove 12s ease infinite;
    opacity:0.9;
    transform: translateY(100%);
    transition: transform 1.2s ease-out;
}

/* wave overlay */
#wave{
    position:absolute;
    top:-40px;
    width:200%;
    height:80px;
    background: rgba(255,255,255,0.08);
    border-radius:50%;
    filter: blur(2px);
    animation: waveMove 6s linear infinite;
}

/* time text */
#time{
    position:absolute;
    top:18%;
    width:100%;
    text-align:center;
    color:white;
    font-size:52px;
    font-weight:700;
    letter-spacing:-1px;
}

#label{
    position:absolute;
    top:28%;
    width:100%;
    text-align:center;
    color:#8aa0a6;
    font-size:14px;
}

/* settings hint */
#hint{
    position:absolute;
    bottom:40px;
    width:100%;
    text-align:center;
    color:#3a5a60;
    font-size:12px;
}

/* scale */
#scale{
    position:absolute;
    right:10px;
    top:0;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    padding:40px 0;
}

.tick{
    width:14px;
    height:2px;
    background:#7fffd4;
    opacity:0.5;
}

/* animations */
@keyframes gradientMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

@keyframes waveMove{
    from{transform:translateX(0);}
    to{transform:translateX(-50%);}
}
</style>
</head>

<body>

<div id="app">

    <div id="time">--:--</div>
    <div id="label">remaining today</div>

    <div id="waterBox">
        <div id="water">
            <div id="wave"></div>
        </div>
    </div>

    <div id="scale"></div>

    <div id="hint">Tap screen to set sleep time</div>

</div>

<script>

let END_HOUR = 23;
let END_MINUTE = 0;

/* load saved time */
const saved = localStorage.getItem("dayflow_end");
if(saved){
    const parts = JSON.parse(saved);
    END_HOUR = parts.h;
    END_MINUTE = parts.m;
}

/* build hour ticks */
for(let i=0;i<24;i++){
    let t=document.createElement("div");
    t.className="tick";
    document.getElementById("scale").appendChild(t);
}

/* set sleep time */
document.body.addEventListener("click", ()=>{
    let input = prompt("Set end time (HH:MM)", `${END_HOUR}:${String(END_MINUTE).padStart(2,'0')}`);
    if(!input) return;

    let parts = input.split(":");
    if(parts.length===2){
        END_HOUR = parseInt(parts[0]);
        END_MINUTE = parseInt(parts[1]);

        localStorage.setItem("dayflow_end", JSON.stringify({
            h: END_HOUR,
            m: END_MINUTE
        }));
    }
});

let animated = false;

function update(){

    const now = new Date();

    const end = new Date();
    end.setHours(END_HOUR, END_MINUTE, 0, 0);

    let remaining = end - now;
    if(remaining < 0) remaining = 0;

    let hours = Math.floor(remaining / 3600000);
    let mins = Math.floor((remaining % 3600000) / 60000);

    document.getElementById("time").innerText =
        `${hours}h ${mins}m`;

    /* progress of day (inverse fill) */
    let total = 24 * 3600000;
    let fill = 1 - (remaining / total);

    let water = document.getElementById("water");

    /* animate only once on open */
    if(!animated){
        setTimeout(()=>{
            water.style.transform = `translateY(${(1-fill)*100}%)`;
        },200);
        animated = true;
    } else {
        water.style.transform = `translateY(${(1-fill)*100}%)`;
    }
}

update();
setInterval(update,1000);

</script>

</body>
</html>
