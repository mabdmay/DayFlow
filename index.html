<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>DayFlow Pro</title>

<style>
html,body{
    margin:0;
    height:100%;
    overflow:hidden;
    background:#05070a;
    font-family:-apple-system, system-ui;
}

/* glass background */
#bg{
    position:absolute;
    width:100%;
    height:100%;
    background:
      radial-gradient(circle at 20% 20%, rgba(0,255,200,0.08), transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(0,150,255,0.08), transparent 40%),
      #05070a;
}

/* glass panel */
#panel{
    position:absolute;
    width:85%;
    height:70%;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    border-radius:32px;

    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);

    border:1px solid rgba(255,255,255,0.08);

    overflow:hidden;
}

/* canvas fluid layer */
canvas{
    position:absolute;
    width:100%;
    height:100%;
    bottom:0;
}

/* text overlay */
#time{
    position:absolute;
    top:18%;
    width:100%;
    text-align:center;
    font-size:54px;
    font-weight:700;
    color:white;
    letter-spacing:-1px;
}

#sub{
    position:absolute;
    top:28%;
    width:100%;
    text-align:center;
    color:rgba(255,255,255,0.5);
    font-size:13px;
}

#hint{
    position:absolute;
    bottom:18px;
    width:100%;
    text-align:center;
    font-size:11px;
    color:rgba(255,255,255,0.25);
}

/* lock screen vibe line */
#line{
    position:absolute;
    top:42%;
    left:50%;
    transform:translateX(-50%);
    width:60%;
    height:1px;
    background:rgba(255,255,255,0.08);
}
</style>
</head>

<body>

<div id="bg"></div>

<div id="panel">

    <canvas id="c"></canvas>

    <div id="time">--:--</div>
    <div id="sub">remaining today</div>
    <div id="line"></div>

    <div id="hint">tap to set sleep time</div>

</div>

<script>

/* ===== SETTINGS ===== */
let END_HOUR = 23;
let END_MINUTE = 0;

/* load saved */
const saved = localStorage.getItem("dayflow_end");
if(saved){
    const s = JSON.parse(saved);
    END_HOUR = s.h;
    END_MINUTE = s.m;
}

/* tap to set */
document.body.addEventListener("click", ()=>{
    navigator.vibrate?.(10);

    let input = prompt("Sleep time (HH:MM)", `${END_HOUR}:${String(END_MINUTE).padStart(2,'0')}`);
    if(!input) return;

    let p = input.split(":");
    if(p.length===2){
        END_HOUR = +p[0];
        END_MINUTE = +p[1];

        localStorage.setItem("dayflow_end", JSON.stringify({
            h: END_HOUR,
            m: END_MINUTE
        }));
    }
});

/* ===== HAPTIC MILESTONES ===== */
let lastMilestone = -1;

/* ===== CANVAS FLUID ENGINE ===== */
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.onresize = resize;

let t = 0;

function drawWater(level){

    const w = canvas.width;
    const h = canvas.height;

    ctx.clearRect(0,0,w,h);

    const baseY = h * (1 - level);

    for(let i=0;i<6;i++){

        ctx.beginPath();

        let alpha = 0.12 - i*0.015;

        ctx.fillStyle = `rgba(0, 255, 200, ${alpha})`;

        for(let x=0;x<w;x+=10){

            let y =
                baseY +
                Math.sin((x*0.01) + t + i)*12 +
                Math.sin((x*0.02) - t*1.5)*6;

            if(x===0) ctx.moveTo(x,y);
            else ctx.lineTo(x,y);
        }

        ctx.lineTo(w,h);
        ctx.lineTo(0,h);
        ctx.closePath();
        ctx.fill();
    }

    /* glow edge */
    ctx.beginPath();
    ctx.strokeStyle = "rgba(0,255,220,0.4)";
    ctx.lineWidth = 2;

    for(let x=0;x<w;x+=10){
        let y = baseY + Math.sin(x*0.01 + t)*10;
        if(x===0) ctx.moveTo(x,y);
        else ctx.lineTo(x,y);
    }
    ctx.stroke();

    t += 0.03;
}

/* ===== UPDATE LOOP ===== */
function update(){

    const now = new Date();
    const end = new Date();
    end.setHours(END_HOUR, END_MINUTE, 0, 0);

    let remaining = Math.max(0, end - now);

    let hours = Math.floor(remaining / 3600000);
    let mins = Math.floor((remaining % 3600000) / 60000);

    document.getElementById("time").innerText =
        `${hours}h ${mins}m`;

    let total = 24*3600000;
    let level = 1 - (remaining / total);

    drawWater(level);

    /* ===== HAPTICS ===== */
    let milestone = Math.floor(remaining / 3600000);

    if(milestone !== lastMilestone){
        lastMilestone = milestone;

        if(milestone <= 5 && milestone >= 0){
            navigator.vibrate?.([30, 50, 30]);
        }
    }
}

setInterval(update, 1000);
update();

</script>

</body>
</html>
