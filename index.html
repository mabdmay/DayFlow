<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>DayFlow</title>

<style>
html,body{
    margin:0;
    height:100%;
    overflow:hidden;
    background:#05070a;
    font-family:-apple-system, system-ui;
    color:white;
}

/* background */
#bg{
    position:absolute;
    width:100%;
    height:100%;
    background: radial-gradient(circle at 50% 20%, rgba(0,255,200,0.08), transparent 55%),
                radial-gradient(circle at 80% 70%, rgba(0,140,255,0.08), transparent 60%),
                #05070a;
}

/* center content */
#center{
    position:absolute;
    width:100%;
    top:18%;
    text-align:center;
}

#now{
    font-size:14px;
    opacity:0.6;
}

#time{
    font-size:64px;
    font-weight:600;
    letter-spacing:-2px;
    margin-top:6px;
}

#until{
    font-size:14px;
    opacity:0.7;
    margin-top:4px;
}

#percent{
    font-size:15px;
    margin-top:10px;
    color:#2ee6c6;
    font-weight:500;
}

/* canvas wave */
canvas{
    position:absolute;
    width:100%;
    height:100%;
    left:0;
    top:0;
}

/* right ruler */
#ruler{
    position:absolute;
    right:14px;
    top:0;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    padding:80px 0;
    font-size:12px;
    opacity:0.7;
}

.tick{
    display:flex;
    align-items:center;
    gap:6px;
    justify-content:flex-end;
}

.line{
    width:10px;
    height:1px;
    background:rgba(255,255,255,0.4);
}
</style>
</head>

<body>

<div id="bg"></div>

<canvas id="c"></canvas>

<div id="center">
    <div id="now">now</div>
    <div id="time">--:--</div>
    <div id="until">until bedtime</div>
    <div id="percent">--% of day left</div>
</div>

<!-- right scale -->
<div id="ruler">
    <div class="tick"><div class="line"></div>15h</div>
    <div class="tick"><div class="line"></div>12h</div>
    <div class="tick"><div class="line"></div>9h</div>
    <div class="tick"><div class="line"></div>6h</div>
    <div class="tick"><div class="line"></div>3h</div>
    <div class="tick"><div class="line"></div>0h</div>
</div>

<script>

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.onresize = resize;

let t = 0;

/* smooth teal gradient wave */
function drawWave(level){

    const w = canvas.width;
    const h = canvas.height;

    ctx.clearRect(0,0,w,h);

    const baseY = h * (0.35 + (1 - level) * 0.55);

    // gradient fill
    let grad = ctx.createLinearGradient(0, baseY, 0, h);
    grad.addColorStop(0, "rgba(46,230,198,0.9)");
    grad.addColorStop(1, "rgba(0,90,120,0.2)");

    for(let layer=0; layer<5; layer++){

        ctx.beginPath();
        let alpha = 0.18 - layer*0.03;
        ctx.fillStyle = grad;

        for(let x=0;x<=w;x+=8){

            let y =
                baseY +
                Math.sin(x*0.008 + t + layer)*10 +
                Math.sin(x*0.015 - t*1.2)*6;

            if(x===0) ctx.moveTo(x,y);
            else ctx.lineTo(x,y);
        }

        ctx.lineTo(w,h);
        ctx.lineTo(0,h);
        ctx.closePath();
        ctx.globalAlpha = alpha;
        ctx.fill();
        ctx.globalAlpha = 1;
    }

    // soft top highlight line
    ctx.beginPath();
    ctx.strokeStyle = "rgba(255,255,255,0.35)";
    ctx.lineWidth = 1;

    for(let x=0;x<=w;x+=8){
        let y = baseY + Math.sin(x*0.01 + t)*8;
        if(x===0) ctx.moveTo(x,y);
        else ctx.lineTo(x,y);
    }
    ctx.stroke();

    t += 0.025;
}

/* main loop */
function update(){

    const now = new Date();

    const h = now.getHours();
    const m = now.getMinutes();

    document.getElementById("time").innerText =
        `${h}:${String(m).padStart(2,'0')}`;

    document.getElementById("now").innerText =
        `now ${h}:${String(m).padStart(2,'0')}`;

    // DAY PROGRESS (THIS matches your screenshot)
    const start = new Date();
    start.setHours(0,0,0,0);

    const end = new Date();
    end.setHours(24,0,0,0);

    const progress = (now - start) / (end - start);
    const percent = Math.round(progress * 100);

    document.getElementById("percent").innerText =
        `${percent}% of day left`;

    document.getElementById("until").innerText =
        `until bedtime`;

    drawWave(progress);
}

setInterval(update, 1000);
update();

</script>

</body>
</html>
